# OpenMagFDM Sample Material Library
#
# This file provides material presets for common soft magnetic materials
# and permanent magnets.
# The B-H characteristics are modeled as continuous functions approximating
# typical catalog data. These are simplified models intended for engineering
# estimates and should be verified against actual material specifications
# for production use.
#
# Usage in analysis config:
#   materials:
#     iron_core:
#       rgb: [128, 128, 128]
#       preset: pure_iron_model   # <-- reference preset name
#       jz: 0.0
#
#     magnet:
#       rgb: [255, 200, 0]
#       preset: NdFeB_N40
#       # override magnetization direction if needed:
#       magnetization:
#         Br: 1.27
#         pattern: parallel
#         angle: 90    # +Y direction
#
# -----------------------------------------------------------------------
# Defining B-H curves with measured data points (table format):
#
#   mu_r: [[H1, H2, H3, ...],          # H [A/m]
#           [mur1, mur2, mur3, ...]]    # relative permeability (dimensionless)
#
#   B-H (normal curve, H >= 0):
#         [[H1, H2, H3, ...],          # H [A/m]
#          [B1, B2, B3, ...]]          # flux density [T]
#   If H[0]=0 and B[0]!=0, treated as residual flux density Br.
#
#   B-H (demagnetization curve, H <= 0):
#         [[-Hcb, ..., 0],             # H [A/m]  left=coercive point, right=remanence
#          [0,    ..., Br]]            # B [T]
#   Br and mu_r are extracted automatically from the slope at H=0.
#   The magnetization block is auto-generated; add one explicitly to set direction.
#   Example (NdFeB N40 approximation):
#     B-H: [[-960000, -800000, -600000, -400000, -200000, 0],
#           [0,       0.05,    0.45,    0.80,    1.05,    1.27]]
#
# Both are interpolated with PCHIP (monotone cubic Hermite) internally.
#
# -----------------------------------------------------------------------
# Formula notation (for continuous-function definitions like below):
#   $H   : magnetic field intensity [A/m]
#   mu0  : vacuum permeability = 4pi x 10^-7 [H/m]
#   pi   : 3.14159...
#   exp  : natural exponential function
# -----------------------------------------------------------------------

material_presets:

  # ===========================================================================
  # Soft magnetic materials
  # ===========================================================================

  # Pure Iron (soft magnetic iron)
  # Characteristics: very high permeability, low coercivity, high saturation (~2.1 T)
  pure_iron_model:
    B-H: ($H/(40 + 0.52*$H) + 4*pi*1e-7*$H) * (1.0/(1.0 + exp(-0.1*($H - 40))))

  # Permendur (Fe-Co 49/49 alloy)
  # Characteristics: highest saturation of common soft magnetics (~2.4 T),
  # used in pole tips and actuators requiring maximum flux density
  permendur_model:
    B-H: ($H/(14.5 + 0.45*$H) + 4*pi*1e-7*$H) * (1.0/(1.0 + exp(-0.1*($H - 25))))

  # Structural steel (mild steel / SS400 equivalent)
  # Characteristics: moderate permeability, widely available structural material
  structural_steel_model:
    B-H: ($H/(97.0 + 0.625*$H) + 4*pi*1e-7*$H) * (1.0/(1.0 + exp(-0.1*($H - 20))))

  # ===========================================================================
  # Permanent magnets (IEC 60404-8-1 / JIS C 2502 typical values)
  #
  # Notes:
  #   - Br: residual flux density [T]  (drives the magnetization model)
  #   - mu_r: reversible permeability of the magnet body (~1.05 for NdFeB)
  #   - magnetization.angle: 0 = +X direction (parallel magnetization)
  #   - All values are typical midpoints of the grade range.
  #     Verify with actual datasheet for production use.
  # ===========================================================================

  # Neodymium sintered magnet — Grade N35
  # IEC 60404-8-1 / JIS C 2502
  #   Br   = 1.17–1.22 T  (typical 1.19 T)
  #   Hcb  >= 764 kA/m    (B-coercivity)
  #   Hcj  >= 955 kA/m    (intrinsic coercivity)
  #   BHmax = 263–302 kJ/m3  (~35 MGOe)
  NdFeB_N35:
    mu_r: 1.05
    magnetization:
      Br: 1.19
      pattern: parallel
      angle: 0

  # Neodymium sintered magnet — Grade N40
  # IEC 60404-8-1 / JIS C 2502
  #   Br   = 1.26–1.29 T  (typical 1.27 T)
  #   Hcb  >= 836 kA/m    (B-coercivity)
  #   Hcj  >= 955 kA/m    (intrinsic coercivity)
  #   BHmax = 310–350 kJ/m3  (~40 MGOe)
  NdFeB_N40:
    mu_r: 1.05
    magnetization:
      Br: 1.27
      pattern: parallel
      angle: 0

  # Neodymium sintered magnet — Grade N45
  # IEC 60404-8-1 / JIS C 2502
  #   Br   = 1.32–1.37 T  (typical 1.34 T)
  #   Hcb  >= 836 kA/m    (B-coercivity)
  #   Hcj  >= 876 kA/m    (intrinsic coercivity)
  #   BHmax = 342–390 kJ/m3  (~45 MGOe)
  NdFeB_N45:
    mu_r: 1.05
    magnetization:
      Br: 1.34
      pattern: parallel
      angle: 0

  # Neodymium sintered magnet — Grade N50
  # IEC 60404-8-1 / JIS C 2502
  #   Br   = 1.40–1.45 T  (typical 1.42 T)
  #   Hcb  >= 796 kA/m    (B-coercivity)
  #   Hcj  >= 876 kA/m    (intrinsic coercivity)
  #   BHmax = 382–422 kJ/m3  (~50 MGOe)
  NdFeB_N50:
    mu_r: 1.05
    magnetization:
      Br: 1.42
      pattern: parallel
      angle: 0

  # Ferrite sintered magnet — High-Br type (FB9B equivalent)
  # JIS C 2502 / IEC 60404-8-1
  #   Br   = ~0.44 T
  #   Hcb  >= 255 kA/m    (B-coercivity)
  #   Hcj  >= 280 kA/m    (intrinsic coercivity)
  ferrite_high_B:
    mu_r: 1.05
    magnetization:
      Br: 0.44
      pattern: parallel
      angle: 0
